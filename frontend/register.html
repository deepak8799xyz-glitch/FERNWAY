<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voltra — Create account</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="register">
<header id="site-header" class="site-header"></header>

<main class="container">
  <div class="form-card">
    <span class="eyebrow">Join Voltra</span>
    <h2>Create an account</h2>
    <div class="form-error" id="form-error"></div>
    <form id="register-form">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>
    <p class="form-note">Already have an account? <a href="login.html" style="color:var(--clay);font-weight:600;">Log in</a></p>
  </div>
</main>

<footer id="site-footer" class="site-footer"></footer>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script src="js/auth-page.js"></script>
</body>
</html>
